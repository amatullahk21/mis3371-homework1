<!DOCTYPE html>
<html lang="en">
<head>
    <!--
    Program name: patient-form.html
    Author: Amatullah Kanchwala
    Date created: 02/25/2026
    Date last edited: 03/25/2026
    Version: 2.0
    Description: Patient registration form for Horizon Medical to collect user registration and demographic information.
    -->
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Horizon Medical Patient Registration Form</title>
    <link rel="stylesheet" href="style.css">

    <script>
        function displayDate() {
            const today = new Date();
            const options = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' };
            document.getElementById("date").innerHTML =
                "Today is: " + today.toLocaleDateString('en-US', options);
        }
    </script>
</head>

<body onload="displayDate()">
    <!-- Header section starts here -->
    <div id="header">
        <img src="logo.png" alt="Horizon Medical Logo" id="logo">
        <h1>Horizon Medical</h1>
        <p id="date"></p>
    </div>

    <!-- Main form section starts here -->
    <div id="main-content">
        <h2>Patient Registration Form</h2>

        <form action="thankyou.html">
            <table>
                <!-- Name row -->
                <tr>
                    <td><label for="fname">First Name:</label></td>
                    <td><input type="text" id="fname" name="fname" maxlength="30" required></td>

                    <td><label for="mi">Middle Initial:</label></td>
                    <td><input type="text" id="mi" name="mi" maxlength="1"></td>

                    <td><label for="lname">Last Name:</label></td>
                    <td><input type="text" id="lname" name="lname" maxlength="30" required></td>
                </tr>

                <!-- DOB and SSN -->
                <tr>
                    <td><label for="dob">Date of Birth:</label></td>
                    <td><input type="text" id="dob" name="dob" placeholder="MM/DD/YYYY" required></td>

                    <td><label for="ssn">Social Security:</label></td>
                    <td colspan="3"><input type="password" id="ssn" name="ssn" maxlength="11" placeholder="123-45-6789" required></td>
                </tr>
<!-- Address information fields -->
                <!-- Address -->
                <tr>
                    <td><label for="address1">Address Line 1:</label></td>
                    <td colspan="5"><input type="text" id="address1" name="address1" maxlength="30" class="long-input" required></td>
                </tr>

                <tr>
                    <td><label for="address2">Address Line 2:</label></td>
                    <td colspan="5"><input type="text" id="address2" name="address2" maxlength="30" class="long-input"></td>
                </tr>

                <!-- City State Zip -->
                <tr>
                    <td><label for="city">City:</label></td>
                    <td><input type="text" id="city" name="city" maxlength="30" required></td>

                    <td><label for="state">State:</label></td>
                    <td>
                        <select id="state" name="state" required>
                            <option value="">Select</option>
                            <option>Alabama</option>
                            <option>Alaska</option>
                            <option>Arizona</option>
                            <option>Arkansas</option>
                            <option>California</option>
                            <option>Colorado</option>
                            <option>Connecticut</option>
                            <option>Delaware</option>
                            <option>District of Columbia</option>
                            <option>Florida</option>
                            <option>Georgia</option>
                            <option>Hawaii</option>
                            <option>Idaho</option>
                            <option>Illinois</option>
                            <option>Indiana</option>
                            <option>Iowa</option>
                            <option>Kansas</option>
                            <option>Kentucky</option>
                            <option>Louisiana</option>
                            <option>Maine</option>
                            <option>Maryland</option>
                            <option>Massachusetts</option>
                            <option>Michigan</option>
                            <option>Minnesota</option>
                            <option>Mississippi</option>
                            <option>Missouri</option>
                            <option>Montana</option>
                            <option>Nebraska</option>
                            <option>Nevada</option>
                            <option>New Hampshire</option>
                            <option>New Jersey</option>
                            <option>New Mexico</option>
                            <option>New York</option>
                            <option>North Carolina</option>
                            <option>North Dakota</option>
                            <option>Ohio</option>
                            <option>Oklahoma</option>
                            <option>Oregon</option>
                            <option>Pennsylvania</option>
                            <option>Puerto Rico</option>
                            <option>Rhode Island</option>
                            <option>South Carolina</option>
                            <option>South Dakota</option>
                            <option>Tennessee</option>
                            <option>Texas</option>
                            <option>Utah</option>
                            <option>Vermont</option>
                            <option>Virginia</option>
                            <option>Washington</option>
                            <option>West Virginia</option>
                            <option>Wisconsin</option>
                            <option>Wyoming</option>
                        </select>
                    </td>

                    <td><label for="zip">Zip Code:</label></td>
                    <td><input type="text" id="zip" name="zip" maxlength="10" required></td>
                </tr>

                <!-- Contact info -->
                <tr>
                    <td><label for="email">Email Address:</label></td>
                    <td><input type="email" id="email" name="email" placeholder="name@domain.com" required></td>

                    <td><label for="phone">Phone Number:</label></td>
                    <td colspan="3"><input type="text" id="phone" name="phone" placeholder="123-456-7890"></td>
                </tr>

                <!-- Text area -->
                <tr>
                    <td><label for="symptoms">Current Symptoms:</label></td>
                    <td colspan="5">
                        <textarea id="symptoms" name="symptoms" rows="3" cols="50" placeholder="Describe your current symptoms here."></textarea>
                    </td>
                </tr>

                <!-- Checkboxes -->
                <tr>
                    <td class="top-align">Medical History:</td>
                    <td colspan="5" class="checkbox-group">
                        <label><input type="checkbox" name="history" value="chickenpox"> Chicken Pox</label>
                        <label><input type="checkbox" name="history" value="measles"> Measles</label>
                        <label><input type="checkbox" name="history" value="covid19"> Covid 19</label>
                        <label><input type="checkbox" name="history" value="smallpox"> Small Pox</label>
                        <label><input type="checkbox" name="history" value="tetanus"> Tetanus</label>
                    </td>
                </tr>

                <!-- Radio buttons set 1 -->
                <tr>
                    <td>Gender:</td>
                    <td colspan="5" class="radio-group">
                        <label><input type="radio" name="gender" value="male"> Male</label>
                        <label><input type="radio" name="gender" value="female"> Female</label>
                        <label><input type="radio" name="gender" value="other"> Other</label>
                    </td>
                </tr>

                <!-- Radio buttons set 2 -->
                <tr>
                    <td>Vaccinated:</td>
                    <td colspan="5" class="radio-group">
                        <label><input type="radio" name="vaccinated" value="yes"> Yes</label>
                        <label><input type="radio" name="vaccinated" value="no"> No</label>
                    </td>
                </tr>

                <!-- Radio buttons set 3 -->
                <tr>
                    <td>Do you have insurance?</td>
                    <td colspan="5" class="radio-group">
                        <label><input type="radio" name="insurance" value="yes"> Yes</label>
                        <label><input type="radio" name="insurance" value="no"> No</label>
                    </td>
                </tr>

                <!-- Slider -->
                <tr>
                    <td><label for="health">Health (1 to 10):</label></td>
                    <td colspan="5"><input type="range" id="health" name="health" min="1" max="10"></td>
                </tr>

                <!-- User login fields -->
                <tr>
                    <td><label for="userid">Desired User ID:</label></td>
                    <td><input type="text" id="userid" name="userid" maxlength="20" required></td>

                    <td><label for="password">Password:</label></td>
                    <td><input type="password" id="password" name="password" required></td>

                    <td><label for="repassword">Re-enter Password:</label></td>
                    <td><input type="password" id="repassword" name="repassword" required></td>
                </tr>

                <!-- Buttons -->
                <tr>
                    <td colspan="6" class="button-row">
                        <input type="reset" value="CLEAR AND START OVER">
                        <input type="submit" value="Submit">
                    </td>
                </tr>
            </table>
        </form>
    </div>

        <!-- Footer section starts here -->
    <div id="footer">
        <div class="footer-left">
            <p>Horizon Medical</p>
            <p>PO Box 18881</p>
            <p>Sugar Land, TX 77496</p>
        </div>

        <div class="footer-center">
            <button type="button">Contact Us</button>
        </div>

        <div class="footer-right">
            <a href="https://www.facebook.com" target="_blank">Facebook</a>
            <a href="https://www.twitter.com" target="_blank">Twitter</a>
        </div>
    </div>

    <!-- End of patient-form.html document -->
</body>
</html>
